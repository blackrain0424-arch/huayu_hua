  <!-- 1. 用户层 -->
  <!-- ====================================================================== -->
  <rect x="60" y="80" width="840" height="68" rx="16" fill="#fff" stroke="#ccc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="108" font-size="15" font-weight="bold" fill="#666">📱 用户层（一套代码，编译为五种平台应用）</text>
  <rect x="90" y="119" width="148" height="20" rx="10" fill="#f0f0f0"/>
  <text x="164" y="133" text-anchor="middle" font-size="12" fill="#555">Android APK</text>
  <rect x="248" y="119" width="148" height="20" rx="10" fill="#f0f0f0"/>
  <text x="322" y="133" text-anchor="middle" font-size="12" fill="#555">iOS IPA</text>
  <rect x="406" y="119" width="148" height="20" rx="10" fill="#f0f0f0"/>
  <text x="480" y="133" text-anchor="middle" font-size="12" fill="#555">Web 网页</text>
  <rect x="564" y="119" width="148" height="20" rx="10" fill="#f0f0f0"/>
  <text x="638" y="133" text-anchor="middle" font-size="12" fill="#555">Windows EXE</text>
  <rect x="722" y="119" width="148" height="20" rx="10" fill="#f0f0f0"/>
  <text x="796" y="133" text-anchor="middle" font-size="12" fill="#555">macOS APP</text>

  <!-- 箭头：用户层 → 前端层 -->
  <line x1="480" y1="148" x2="480" y2="174" stroke="#999" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ====================================================================== -->
  <!-- 2. Flutter 前端层 -->
  <!-- ====================================================================== -->
  <rect x="60" y="180" width="840" height="210" rx="18" fill="url(#gFlutter)" stroke="#A5D6A7" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="210" font-size="16" font-weight="bold" fill="#2E7D32">Flutter 前端（Flutter 3.41.9 + Dart 3.11.5）</text>

  <!-- 5 个模块卡片 -->
  <rect x="78" y="226" width="152" height="148" rx="12" fill="rgba(255,255,255,0.88)" stroke="rgba(0,0,0,0.06)"/>
  <text x="154" y="258" text-anchor="middle" font-size="28">🗺️</text>
  <text x="154" y="282" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">地图赏花</text>
  <text x="154" y="302" text-anchor="middle" font-size="11" fill="#777">全国花卉地图</text>
  <text x="154" y="320" text-anchor="middle" font-size="11" fill="#777">22个赏花地标记</text>
  <text x="154" y="338" text-anchor="middle" font-size="11" fill="#777">GPS 定位</text>
  <text x="154" y="356" text-anchor="middle" font-size="11" fill="#777">城市/花名搜索</text>

  <rect x="242" y="226" width="152" height="148" rx="12" fill="rgba(255,255,255,0.88)" stroke="rgba(0,0,0,0.06)"/>
  <text x="318" y="258" text-anchor="middle" font-size="28">🌸</text>
  <text x="318" y="282" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">花卉百科</text>
  <text x="318" y="302" text-anchor="middle" font-size="11" fill="#777">每日一花推荐</text>
  <text x="318" y="320" text-anchor="middle" font-size="11" fill="#777">35种花卉图鉴</text>
  <text x="318" y="338" text-anchor="middle" font-size="11" fill="#777">42城市市花</text>
  <text x="318" y="356" text-anchor="middle" font-size="11" fill="#777">季节推荐 · 月份指南</text>

  <rect x="406" y="226" width="152" height="148" rx="12" fill="rgba(255,255,255,0.88)" stroke="rgba(0,0,0,0.06)"/>
  <text x="482" y="258" text-anchor="middle" font-size="28">👥</text>
  <text x="482" y="282" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">花友社区</text>
  <text x="482" y="302" text-anchor="middle" font-size="11" fill="#777">图文发帖</text>
  <text x="482" y="320" text-anchor="middle" font-size="11" fill="#777">花标签 · 位置标记</text>
  <text x="482" y="338" text-anchor="middle" font-size="11" fill="#777">点赞 · 评论</text>
  <text x="482" y="356" text-anchor="middle" font-size="11" fill="#777">图片上传</text>

  <rect x="570" y="226" width="152" height="148" rx="12" fill="rgba(255,255,255,0.88)" stroke="rgba(0,0,0,0.06)"/>
  <text x="646" y="258" text-anchor="middle" font-size="28">🤖</text>
  <text x="646" y="282" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">花语 Bot</text>
  <text x="646" y="302" text-anchor="middle" font-size="11" fill="#777">AI 花卉问答</text>
  <text x="646" y="320" text-anchor="middle" font-size="11" fill="#777">拍照识花</text>
  <text x="646" y="338" text-anchor="middle" font-size="11" fill="#777">离线匹配</text>
  <text x="646" y="356" text-anchor="middle" font-size="11" fill="#777">TTS 语音朗读</text>

  <rect x="734" y="226" width="152" height="148" rx="12" fill="rgba(255,255,255,0.88)" stroke="rgba(0,0,0,0.06)"/>
  <text x="810" y="258" text-anchor="middle" font-size="28">👤</text>
  <text x="810" y="282" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">个人中心</text>
  <text x="810" y="302" text-anchor="middle" font-size="11" fill="#777">邮箱注册/登录</text>
  <text x="810" y="320" text-anchor="middle" font-size="11" fill="#777">我的收藏</text>
  <text x="810" y="338" text-anchor="middle" font-size="11" fill="#777">浏览历史</text>
  <text x="810" y="356" text-anchor="middle" font-size="11" fill="#777">资料编辑 · 设置</text>

  <!-- 两个独立的向下箭头：左 → Supabase，右 → 高德（无横线连接） -->
  <line x1="200" y1="390" x2="200" y2="420" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="760" y1="390" x2="760" y2="420" stroke="#FF9800" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

