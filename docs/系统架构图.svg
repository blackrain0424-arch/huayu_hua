  <!-- ====================================================================== -->

  <!-- 左侧：Supabase -->
  <rect x="60" y="428" width="440" height="170" rx="16" fill="#fff" stroke="#81C784" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="428" width="440" height="38" rx="16" fill="#E8F5E9"/>
  <rect x="60" y="450" width="440" height="16" fill="#E8F5E9"/>
  <text x="280" y="453" text-anchor="middle" font-size="15" font-weight="bold" fill="#1B5E20">☁️ 后端服务 — Supabase BaaS</text>

  <rect x="78" y="478" width="198" height="52" rx="8" fill="#E8F5E9" stroke="#C8E6C9"/>
