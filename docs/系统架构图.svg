<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1060" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="gFlutter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="50%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FCE4EC"/>
    </linearGradient>
    <linearGradient id="gAI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE7F6"/>
      <stop offset="100%" style="stop-color:#E1F5FE"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0000001a"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4CAF50"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#FF9800"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7C4DFF"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- ====== 标题 ====== -->
  <text x="480" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#2E7D32">华语花 APP — 系统架构图</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#999">Flutter 跨平台框架 · Supabase 后端云服务 · 双引擎 AI</text>

