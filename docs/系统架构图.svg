  <text x="385" y="500" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">🗄️ 数据库 (PostgreSQL)</text>
  <text x="385" y="520" text-anchor="middle" font-size="11" fill="#666">帖子 · 评论 · 点赞 · 用户资料</text>

  <rect x="78" y="538" width="198" height="48" rx="8" fill="#E8F5E9" stroke="#C8E6C9"/>
  <text x="177" y="558" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">📦 文件存储 (Storage)</text>
  <text x="177" y="576" text-anchor="middle" font-size="11" fill="#666">社区图片上传</text>

  <rect x="286" y="538" width="198" height="48" rx="8" fill="#C8E6C9" stroke="#A5D6A7"/>
  <text x="385" y="558" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">⚡ 边缘函数 (Edge Function)</text>
  <text x="385" y="576" text-anchor="middle" font-size="11" fill="#555">AI 请求中转代理 (Deno 运行时)</text>

  <!-- 右侧：高德地图 -->
  <rect x="520" y="428" width="380" height="170" rx="16" fill="#fff" stroke="#FFCC80" stroke-width="2" filter="url(#shadow)"/>
