  <rect x="520" y="450" width="380" height="16" fill="#FFF3E0"/>
  <text x="710" y="453" text-anchor="middle" font-size="15" font-weight="bold" fill="#E65100">🗺️ 地图服务 — 高德地图 API</text>

  <rect x="538" y="478" width="344" height="42" rx="8" fill="#FFF3E0" stroke="#FFE0B2"/>
  <text x="710" y="498" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">🗺️ 瓦片图层</text>
  <text x="710" y="514" text-anchor="middle" font-size="11" fill="#888">webrd01.is.autonavi.com（style=7 清新绿）</text>

  <rect x="538" y="526" width="344" height="42" rx="8" fill="#FFF3E0" stroke="#FFE0B2"/>
  <text x="710" y="546" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">🔍 地点搜索 (inputtips)</text>
  <text x="710" y="562" text-anchor="middle" font-size="11" fill="#888">按城市名、花名、地名智能搜索</text>

  <rect x="538" y="574" width="344" height="16" rx="8" fill="#FFF3E0" stroke="#FFE0B2"/>
  <text x="710" y="586" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">📍 逆地理编码 (regeo) — 坐标 → 地址</text>

  <!-- ====================================================================== -->
  <!-- 箭头：Supabase Edge Function → AI 模型层（单条竖线，无横线） -->
  <!-- ====================================================================== -->
  <line x1="385" y1="598" x2="385" y2="630" stroke="#7C4DFF" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <text x="405" y="618" font-size="10" fill="#7C4DFF">AI 调用</text>

  <!-- ====================================================================== -->
  <!-- 4. AI 模型层 -->
  <!-- ====================================================================== -->
  <rect x="60" y="638" width="840" height="160" rx="18" fill="url(#gAI)" stroke="#B39DDB" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="668" font-size="16" font-weight="bold" fill="#4527A0">🧠 AI 模型层 — 在线双引擎 + 离线兜底</text>

  <!-- 三列 -->
  <rect x="78" y="686" width="260" height="98" rx="12" fill="rgba(255,255,255,0.85)" stroke="rgba(0,0,0,0.05)"/>
  <text x="208" y="714" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">🧠 DeepSeek 大语言模型</text>
  <text x="208" y="734" text-anchor="middle" font-size="12" fill="#7C4DFF">自然语言花卉问答</text>
  <text x="208" y="754" text-anchor="middle" font-size="11" fill="#888">理解口语化提问（如"最近什么花好看"）</text>
  <text x="208" y="772" text-anchor="middle" font-size="11" fill="#888">多轮对话 · 上下文记忆 · 有温度的回复</text>

  <rect x="350" y="686" width="260" height="98" rx="12" fill="rgba(255,255,255,0.85)" stroke="rgba(0,0,0,0.05)"/>
  <text x="480" y="714" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">👁️ Qwen-VL-Plus 多模态模型</text>
  <text x="480" y="734" text-anchor="middle" font-size="12" fill="#7C4DFF">拍照识花 · 图像理解</text>
  <text x="480" y="754" text-anchor="middle" font-size="11" fill="#888">Base64 图片编码传输</text>
  <text x="480" y="772" text-anchor="middle" font-size="11" fill="#888">阿里云 DashScope API 提供</text>

  <rect x="622" y="686" width="260" height="98" rx="12" fill="rgba(255,255,255,0.85)" stroke="rgba(0,0,0,0.05)"/>
  <text x="752" y="714" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">📚 本地离线匹配引擎</text>
  <text x="752" y="734" text-anchor="middle" font-size="12" fill="#7C4DFF">AI 不可用时自动降级</text>
  <text x="752" y="754" text-anchor="middle" font-size="11" fill="#888">50+ 花卉关键词 · 42 城市市花</text>
  <text x="752" y="772" text-anchor="middle" font-size="11" fill="#888">22 赏花地 · 35 种花卉图鉴</text>

