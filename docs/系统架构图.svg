<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1050" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="gFlutter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="50%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FCE4EC"/>
    </linearGradient>
    <linearGradient id="gAI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE7F6"/>
      <stop offset="100%" style="stop-color:#E1F5FE"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0000001a"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4CAF50"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#FF9800"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7C4DFF"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- ====== 标题 ====== -->
  <text x="480" y="36" text-anchor="middle" font-size="24" font-weight="bold" fill="#2E7D32">华语花 APP — 系统架构图</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#999">Flutter 跨平台框架 · Supabase 后端云服务 · 双引擎 AI</text>

  <!-- ====== 1. 用户层 ====== -->
  <rect x="60" y="80" width="840" height="66" rx="16" fill="#fff" stroke="#ccc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="107" font-size="15" font-weight="bold" fill="#666">📱 用户层（一套代码，编译为五种平台应用）</text>
  <rect x="90" y="118" width="146" height="20" rx="10" fill="#f0f0f0"/><text x="163" y="132" text-anchor="middle" font-size="12" fill="#555">Android APK</text>
  <rect x="246" y="118" width="146" height="20" rx="10" fill="#f0f0f0"/><text x="319" y="132" text-anchor="middle" font-size="12" fill="#555">iOS IPA</text>
  <rect x="402" y="118" width="146" height="20" rx="10" fill="#f0f0f0"/><text x="475" y="132" text-anchor="middle" font-size="12" fill="#555">Web 网页</text>
  <rect x="558" y="118" width="146" height="20" rx="10" fill="#f0f0f0"/><text x="631" y="132" text-anchor="middle" font-size="12" fill="#555">Windows EXE</text>
  <rect x="714" y="118" width="146" height="20" rx="10" fill="#f0f0f0"/><text x="787" y="132" text-anchor="middle" font-size="12" fill="#555">macOS APP</text>

  <!-- 箭头：用户层 → 前端层 -->
  <line x1="480" y1="146" x2="480" y2="172" stroke="#999" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ====== 2. Flutter 前端层 ====== -->
  <rect x="60" y="180" width="840" height="206" rx="18" fill="url(#gFlutter)" stroke="#A5D6A7" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="209" font-size="16" font-weight="bold" fill="#2E7D32">Flutter 前端（Flutter 3.41.9 + Dart 3.11.5）</text>

  <rect x="78" y="224" width="152" height="148" rx="12" fill="rgba(255,255,255,0.88)" stroke="rgba(0,0,0,0.06)"/>
  <text x="154" y="254" text-anchor="middle" font-size="28">🗺️</text>
  <text x="154" y="278" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">地图赏花</text>
  <text x="154" y="298" text-anchor="middle" font-size="11" fill="#777">全国花卉地图</text>
  <text x="154" y="316" text-anchor="middle" font-size="11" fill="#777">22 个赏花地标记</text>
  <text x="154" y="334" text-anchor="middle" font-size="11" fill="#777">GPS 定位</text>
  <text x="154" y="352" text-anchor="middle" font-size="11" fill="#777">城市/花名搜索</text>

  <rect x="242" y="224" width="152" height="148" rx="12" fill="rgba(255,255,255,0.88)" stroke="rgba(0,0,0,0.06)"/>
  <text x="318" y="254" text-anchor="middle" font-size="28">🌸</text>
  <text x="318" y="278" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">花卉百科</text>
  <text x="318" y="298" text-anchor="middle" font-size="11" fill="#777">每日一花推荐</text>
  <text x="318" y="316" text-anchor="middle" font-size="11" fill="#777">35 种花卉图鉴</text>
  <text x="318" y="334" text-anchor="middle" font-size="11" fill="#777">42 城市市花</text>
  <text x="318" y="352" text-anchor="middle" font-size="11" fill="#777">季节推荐·月份指南</text>

  <rect x="406" y="224" width="152" height="148" rx="12" fill="rgba(255,255,255,0.88)" stroke="rgba(0,0,0,0.06)"/>
  <text x="482" y="254" text-anchor="middle" font-size="28">👥</text>
  <text x="482" y="278" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">花友社区</text>
  <text x="482" y="298" text-anchor="middle" font-size="11" fill="#777">图文发帖</text>
  <text x="482" y="316" text-anchor="middle" font-size="11" fill="#777">花标签·位置标记</text>
  <text x="482" y="334" text-anchor="middle" font-size="11" fill="#777">点赞·评论</text>
  <text x="482" y="352" text-anchor="middle" font-size="11" fill="#777">图片上传</text>

  <rect x="570" y="224" width="152" height="148" rx="12" fill="rgba(255,255,255,0.88)" stroke="rgba(0,0,0,0.06)"/>
  <text x="646" y="254" text-anchor="middle" font-size="28">🤖</text>
  <text x="646" y="278" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">花语 Bot</text>
  <text x="646" y="298" text-anchor="middle" font-size="11" fill="#777">AI 花卉问答</text>
  <text x="646" y="316" text-anchor="middle" font-size="11" fill="#777">拍照识花</text>
  <text x="646" y="334" text-anchor="middle" font-size="11" fill="#777">离线匹配</text>
  <text x="646" y="352" text-anchor="middle" font-size="11" fill="#777">TTS 语音朗读</text>

  <rect x="734" y="224" width="152" height="148" rx="12" fill="rgba(255,255,255,0.88)" stroke="rgba(0,0,0,0.06)"/>
  <text x="810" y="254" text-anchor="middle" font-size="28">👤</text>
  <text x="810" y="278" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">个人中心</text>
  <text x="810" y="298" text-anchor="middle" font-size="11" fill="#777">邮箱注册/登录</text>
  <text x="810" y="316" text-anchor="middle" font-size="11" fill="#777">我的收藏</text>
  <text x="810" y="334" text-anchor="middle" font-size="11" fill="#777">浏览历史</text>
  <text x="810" y="352" text-anchor="middle" font-size="11" fill="#777">资料编辑·设置</text>

  <!-- 两条独立箭头：左(绿)→Supabase，右(橙)→高德。文字放在箭头中间空白区 -->
  <line x1="200" y1="386" x2="200" y2="418" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="760" y1="386" x2="760" y2="418" stroke="#FF9800" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- 箭头标签放在箭头右侧空白处，不与线条重叠 -->
  <text x="214" y="404" font-size="11" fill="#4CAF50">数据 / API 请求</text>
  <text x="774" y="404" font-size="11" fill="#FF9800">地图瓦片 / 搜索</text>

  <!-- ====== 3. 后端双栏 ====== -->
  <!-- Supabase -->
  <rect x="60" y="426" width="440" height="170" rx="16" fill="#fff" stroke="#81C784" stroke-width="2" filter="url(#shadow)"/>
  <rect x="60" y="426" width="440" height="36" rx="16" fill="#E8F5E9"/><rect x="60" y="446" width="440" height="16" fill="#E8F5E9"/>
  <text x="280" y="450" text-anchor="middle" font-size="15" font-weight="bold" fill="#1B5E20">☁️ 后端服务 — Supabase BaaS</text>

  <rect x="78" y="475" width="198" height="52" rx="8" fill="#E8F5E9" stroke="#C8E6C9"/>
  <text x="177" y="496" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">🔐 用户认证 (Auth)</text>
  <text x="177" y="516" text-anchor="middle" font-size="11" fill="#666">邮箱注册 / 登录 / 会话管理</text>

  <rect x="286" y="475" width="198" height="52" rx="8" fill="#E8F5E9" stroke="#C8E6C9"/>
  <text x="385" y="496" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">🗄️ 数据库 (PostgreSQL)</text>
  <text x="385" y="516" text-anchor="middle" font-size="11" fill="#666">帖子 · 评论 · 点赞 · 用户资料</text>

  <rect x="78" y="534" width="198" height="50" rx="8" fill="#E8F5E9" stroke="#C8E6C9"/>
  <text x="177" y="555" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">📦 文件存储 (Storage)</text>
  <text x="177" y="575" text-anchor="middle" font-size="11" fill="#666">社区图片上传</text>

  <rect x="286" y="534" width="198" height="50" rx="8" fill="#C8E6C9" stroke="#A5D6A7"/>
  <text x="385" y="555" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">⚡ 边缘函数 (Edge Function)</text>
  <text x="385" y="575" text-anchor="middle" font-size="11" fill="#555">AI 请求中转代理 (Deno 运行时)</text>

  <!-- 高德 -->
  <rect x="520" y="426" width="380" height="170" rx="16" fill="#fff" stroke="#FFCC80" stroke-width="2" filter="url(#shadow)"/>
  <rect x="520" y="426" width="380" height="36" rx="16" fill="#FFF3E0"/><rect x="520" y="446" width="380" height="16" fill="#FFF3E0"/>
  <text x="710" y="450" text-anchor="middle" font-size="15" font-weight="bold" fill="#E65100">🗺️ 地图服务 — 高德地图 API</text>

  <rect x="538" y="475" width="344" height="42" rx="8" fill="#FFF3E0" stroke="#FFE0B2"/>
  <text x="710" y="494" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">🗺️ 瓦片图层</text>
  <text x="710" y="510" text-anchor="middle" font-size="11" fill="#888">webrd01.is.autonavi.com（style=7 清新绿色）</text>

  <rect x="538" y="523" width="344" height="42" rx="8" fill="#FFF3E0" stroke="#FFE0B2"/>
  <text x="710" y="542" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">🔍 地点搜索 (inputtips)</text>
  <text x="710" y="558" text-anchor="middle" font-size="11" fill="#888">按城市名、花名、地名智能搜索</text>

  <rect x="538" y="571" width="344" height="17" rx="8" fill="#FFF3E0" stroke="#FFE0B2"/>
  <text x="710" y="583" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">📍 逆地理编码 (regeo) — 坐标转地址</text>

  <!-- 紫色箭头：Edge Function → AI 层。标签放在箭头右侧 -->
  <line x1="385" y1="596" x2="385" y2="630" stroke="#7C4DFF" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <text x="399" y="615" font-size="11" fill="#7C4DFF">AI 模型调用（经 Edge Function 代理）</text>

  <!-- ====== 4. AI 模型层 ====== -->
  <rect x="60" y="638" width="840" height="160" rx="18" fill="url(#gAI)" stroke="#B39DDB" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="667" font-size="16" font-weight="bold" fill="#4527A0">🧠 AI 模型层 — 在线双引擎 + 离线兜底</text>

  <rect x="78" y="684" width="260" height="100" rx="12" fill="rgba(255,255,255,0.85)" stroke="rgba(0,0,0,0.05)"/>
  <text x="208" y="712" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">🧠 DeepSeek 大语言模型</text>
  <text x="208" y="732" text-anchor="middle" font-size="12" fill="#7C4DFF">自然语言花卉问答</text>
  <text x="208" y="752" text-anchor="middle" font-size="11" fill="#888">理解口语化提问（如"最近什么花好看"）</text>
  <text x="208" y="772" text-anchor="middle" font-size="11" fill="#888">多轮对话 · 上下文记忆 · 有温度的回复</text>

  <rect x="350" y="684" width="260" height="100" rx="12" fill="rgba(255,255,255,0.85)" stroke="rgba(0,0,0,0.05)"/>
  <text x="480" y="712" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">👁️ Qwen-VL-Plus 多模态模型</text>
  <text x="480" y="732" text-anchor="middle" font-size="12" fill="#7C4DFF">拍照识花 · 图像理解</text>
  <text x="480" y="752" text-anchor="middle" font-size="11" fill="#888">Base64 图片编码传输</text>
  <text x="480" y="772" text-anchor="middle" font-size="11" fill="#888">阿里云 DashScope API 提供</text>

  <rect x="622" y="684" width="260" height="100" rx="12" fill="rgba(255,255,255,0.85)" stroke="rgba(0,0,0,0.05)"/>
  <text x="752" y="712" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">📚 本地离线匹配引擎</text>
  <text x="752" y="732" text-anchor="middle" font-size="12" fill="#7C4DFF">AI 不可用时自动降级切换</text>
  <text x="752" y="752" text-anchor="middle" font-size="11" fill="#888">50+ 花卉关键词 · 42 城市市花</text>
  <text x="752" y="772" text-anchor="middle" font-size="11" fill="#888">22 赏花地 · 35 种花卉图鉴</text>

  <!-- ====== 图例 ====== -->
  <rect x="200" y="815" width="560" height="30" rx="10" fill="#fafafa" stroke="#e0e0e0"/>
