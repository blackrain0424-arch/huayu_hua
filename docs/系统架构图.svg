  <line x1="375" y1="830" x2="403" y2="830" stroke="#FF9800" stroke-width="2.5"/><text x="409" y="834" font-size="11" fill="#666">地图服务</text>
  <line x1="504" y1="830" x2="532" y2="830" stroke="#7C4DFF" stroke-width="2.5"/><text x="538" y="834" font-size="11" fill="#666">AI 模型调用</text>
  <line x1="645" y1="830" x2="673" y2="830" stroke="#999" stroke-width="2"/><text x="679" y="834" font-size="11" fill="#666">层级关系</text>

  <text x="480" y="872" text-anchor="middle" font-size="12" fill="#bbb">华语花 — 寻芳中国花卉社区 · 系统架构图</text>
